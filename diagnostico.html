<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Diagnóstico ChatBoot</title><style>body{font-family:Segoe UI,Arial;background:#eef1f7;margin:0;padding:24px;color:#182230}.card{max-width:900px;margin:auto;background:#fff;border-radius:20px;padding:24px;box-shadow:0 18px 45px #0002}h1{color:#5b2c83}.ok{color:#067647}.bad{color:#b42318}.warn{color:#b54708}li{margin:8px 0}button{background:#5b2c83;color:#fff;border:0;border-radius:10px;padding:10px 15px;cursor:pointer}</style></head><body><div class="card"><h1>Diagnóstico del chatbot</h1><p>Revisa destinos inexistentes y menús sin contenido.</p><button onclick="run()">Ejecutar validación</button><div id="out"><p>Presiona el botón para iniciar.</p></div><iframe id="app" src="./index.html" style="width:1px;height:1px;border:0;opacity:0"></iframe></div><script>function run(){const out=document.getElementById('out'),f=document.getElementById('app');try{const d=f.contentWindow.validateNodes(false);if(!d)throw Error('El chatbot todavía está cargando. Intenta nuevamente.');out.innerHTML=`<h2 class="${d.errors.length?'bad':'ok'}">${d.errors.length?'Se detectaron errores':'Sistema listo'}</h2><p>Total de nodos: ${d.total}</p><h3>Errores (${d.errors.length})</h3><ul>${d.errors.map(x=>`<li class="bad">${x}</li>`).join('')||'<li class="ok">Ninguno</li>'}</ul><h3>Advertencias (${d.warnings.length})</h3><ul>${d.warnings.map(x=>`<li class="warn">${x}</li>`).join('')||'<li class="ok">Ninguna</li>'}</ul>`}catch(e){out.innerHTML='<p class="warn">'+e.message+'</p>'}}</script></body></html>
