<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>Administrador · Asistente Abordo</title>
<meta name="theme-color" content="#5B2C83">
<style>
:root{--p:#5b2c83;--p2:#7c3fad;--g:#00a987;--bg:#f5f6fb;--card:#fff;--text:#252238;--muted:#6d6880;--line:#e4e0ec;--danger:#b42318;--shadow:0 16px 42px rgba(45,29,68,.13)}*{box-sizing:border-box}body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:linear-gradient(135deg,#f7f4fb,#eef9f6);color:var(--text)}button,input,textarea,select{font:inherit}.hidden{display:none!important}.login{min-height:100vh;display:grid;place-items:center;padding:24px}.login-card{width:min(430px,100%);background:rgba(255,255,255,.96);border:1px solid var(--line);border-radius:26px;padding:28px;box-shadow:var(--shadow)}.logo{width:64px;height:64px;border-radius:20px;display:grid;place-items:center;background:linear-gradient(135deg,var(--p2),var(--g));color:#fff;font-size:32px}.login h1{margin:18px 0 6px;font-size:26px}.muted{color:var(--muted)}label{display:block;font-size:13px;font-weight:800;margin:14px 0 6px}.field{width:100%;border:1px solid var(--line);border-radius:13px;padding:12px;background:#fff}.primary{border:0;border-radius:13px;padding:12px 17px;background:linear-gradient(135deg,var(--p),var(--p2));color:#fff;font-weight:800;cursor:pointer}.wide{width:100%;margin-top:16px}.error{margin-top:12px;color:var(--danger);font-weight:700}.shell{min-height:100vh;display:grid;grid-template-columns:250px 1fr}.sidebar{background:#21162e;color:#fff;padding:22px;display:flex;flex-direction:column;gap:18px}.brand{display:flex;gap:12px;align-items:center}.brand .logo{width:46px;height:46px;font-size:23px}.brand strong{display:block}.brand small{opacity:.72}.nav button{width:100%;text-align:left;border:0;background:transparent;color:#e9deef;border-radius:12px;padding:11px 12px;cursor:pointer;margin:3px 0;font-weight:700}.nav button.active,.nav button:hover{background:rgba(255,255,255,.12);color:#fff}.side-bottom{margin-top:auto}.side-bottom a{color:#fff}.main{min-width:0}.topbar{height:76px;display:flex;align-items:center;justify-content:space-between;padding:0 26px;background:rgba(255,255,255,.9);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:5;backdrop-filter:blur(12px)}.content{padding:25px;max-width:1500px;margin:auto}.stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;margin-bottom:22px}.stat{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:17px;box-shadow:0 8px 25px rgba(45,29,68,.06)}.stat b{display:block;font-size:28px;color:var(--p)}.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px}.toolbar .field{max-width:360px}.secondary,.danger{border:1px solid var(--line);border-radius:12px;padding:10px 14px;background:#fff;font-weight:800;cursor:pointer}.danger{color:var(--danger)}.panel{background:#fff;border:1px solid var(--line);border-radius:20px;box-shadow:0 8px 25px rgba(45,29,68,.07);overflow:hidden}.table-wrap{overflow:auto;max-height:calc(100vh - 255px)}table{border-collapse:collapse;width:100%;min-width:850px}th,td{padding:11px 12px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top;font-size:13px}th{position:sticky;top:0;background:#f8f6fa;color:#51475c;z-index:1}.cell-limit{max-width:330px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.actions{white-space:nowrap}.actions button{border:0;background:#f2edf6;border-radius:9px;padding:7px 9px;cursor:pointer;margin-right:4px}.modal{position:fixed;inset:0;background:rgba(25,15,36,.56);display:grid;place-items:center;padding:18px;z-index:20}.modal-card{width:min(760px,100%);max-height:92vh;overflow:auto;background:#fff;border-radius:22px;padding:22px;box-shadow:var(--shadow)}.modal-head{display:flex;justify-content:space-between;align-items:center}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.grid .full{grid-column:1/-1}textarea.field{min-height:110px;resize:vertical}.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:20px}.toast{position:fixed;right:20px;bottom:20px;background:#21162e;color:#fff;border-radius:13px;padding:12px 16px;box-shadow:var(--shadow);z-index:30}.mobile-menu{display:none}@media(max-width:900px){.shell{grid-template-columns:1fr}.sidebar{position:fixed;inset:0 auto 0 0;width:260px;z-index:15;transform:translateX(-105%);transition:.2s}.sidebar.open{transform:none}.mobile-menu{display:inline-grid}.stats{grid-template-columns:repeat(2,1fr)}.grid{grid-template-columns:1fr}.topbar{padding:0 14px}.content{padding:15px}}@media(max-width:520px){.stats{grid-template-columns:1fr 1fr}.stat{padding:13px}.stat b{font-size:23px}}

/* === Panel administrativo adaptable 9.1 === */
html,body{max-width:100%;min-height:100%;overflow-x:hidden;-webkit-text-size-adjust:100%}
.login{min-height:100svh;padding:max(16px,env(safe-area-inset-top)) 14px max(16px,env(safe-area-inset-bottom))}
.shell{min-height:100svh}
@media(max-width:900px){
 .shell{min-height:100dvh}.main{width:100%;overflow:hidden}.topbar{height:auto;min-height:66px;padding-top:max(8px,env(safe-area-inset-top))}
 .content{width:100%;max-width:100%;padding-bottom:calc(18px + env(safe-area-inset-bottom))}
 .sidebar{padding-top:calc(18px + env(safe-area-inset-top));padding-bottom:calc(18px + env(safe-area-inset-bottom));max-width:86vw;overflow-y:auto}
 .table-wrap{max-height:none;width:100%;overflow:auto;-webkit-overflow-scrolling:touch}
 .panel{max-width:100%;overflow:hidden}
 .modal{padding:calc(10px + env(safe-area-inset-top)) 8px calc(10px + env(safe-area-inset-bottom));align-items:end}
 .modal-card{width:100%;max-height:92dvh;border-radius:20px 20px 0 0;padding:17px}
}
@media(max-width:600px){
 .login-card{padding:22px 18px;border-radius:20px}.login h1{font-size:23px}.field{font-size:16px}
 .topbar{gap:8px}.topbar>div{min-width:0}.topbar strong{font-size:14px}.topbar .muted{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:150px}
 .content{padding:12px}.stats{grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}.stat{padding:11px;border-radius:14px}.stat b{font-size:21px}
 .toolbar{display:grid;grid-template-columns:1fr 1fr;gap:8px}.toolbar .field{grid-column:1/-1;max-width:none;font-size:16px}.toolbar button{width:100%;padding:10px 7px;font-size:12px}
 table{min-width:720px}.cell-limit{max-width:220px}.modal-actions{position:sticky;bottom:-17px;background:#fff;padding:12px 0 calc(4px + env(safe-area-inset-bottom));margin-top:12px}
 .toast{left:10px;right:10px;bottom:calc(10px + env(safe-area-inset-bottom));text-align:center}
}
@media(max-width:380px){.stats{grid-template-columns:1fr}.topbar #logoutBtn{padding:8px;font-size:11px}}

</style>
</head>
<body>
<section id="login" class="login"><div class="login-card"><div class="logo">🤖</div><h1>Administrador</h1><p class="muted">Gestiona el contenido autorizado de Asistente Abordo.</p><form id="loginForm"><label for="password">Contraseña</label><input class="field" id="password" type="password" inputmode="numeric" autocomplete="current-password" required><button class="primary wide" type="submit">Ingresar</button><div id="loginError" class="error"></div></form><p class="muted" style="font-size:12px;margin-top:18px">La contraseña se valida en Apps Script; no se almacena en GitHub.</p></div></section>
<div id="app" class="shell hidden"><aside id="sidebar" class="sidebar"><div class="brand"><div class="logo">🤖</div><div><strong>Asistente Abordo</strong><small>Panel administrativo</small></div></div><nav id="nav" class="nav"></nav><div class="side-bottom"><a href="./index.html">← Volver al chatbot</a></div></aside><main class="main"><header class="topbar"><div style="display:flex;gap:10px;align-items:center"><button id="menuBtn" class="secondary mobile-menu">☰</button><div><strong id="sectionTitle">Resumen</strong><div class="muted" style="font-size:12px">Google Sheets conectado</div></div></div><button id="logoutBtn" class="secondary">Cerrar sesión</button></header><div class="content"><div id="stats" class="stats"></div><div class="toolbar"><input id="search" class="field" type="search" placeholder="Buscar en esta sección…"><button id="newBtn" class="primary">＋ Nuevo registro</button><button id="refreshBtn" class="secondary">↻ Actualizar</button></div><div class="panel"><div class="table-wrap"><table><thead id="thead"></thead><tbody id="tbody"></tbody></table></div></div></div></main></div>
<div id="modal" class="modal hidden"><div class="modal-card"><div class="modal-head"><h2 id="modalTitle">Editar</h2><button id="closeModal" class="secondary">✕</button></div><form id="recordForm"><div id="fields" class="grid"></div><div class="modal-actions"><button type="button" id="cancelModal" class="secondary">Cancelar</button><button class="primary" type="submit">Guardar</button></div></form></div></div>
<div id="toast" class="toast hidden"></div>
<script src="./api-config.js"></script><script src="./admin-app.js?v=9.1"></script>
</body></html>
